<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1>Water Quest</h1>
    <p class="game-instructions">Collect water cans to complete the game!</p>
    <p class="game-rock-hint"><i>Collecting rocks will reduce your score.</i></p>
    <div class="difficulty-selection">
      <p>Select Difficulty:</p>
      <button class="difficulty-btn" data-difficulty="easy">Easy</button>
      <button class="difficulty-btn" data-difficulty="medium">Medium</button>
      <button class="difficulty-btn" data-difficulty="hard">Hard</button>
    </div>
    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Goal: <span id="goal">25</span></p>
      <p>Time Left: <span id="timer">40</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>
  </div>
  <footer>
    <p>Support <a href="https://www.charitywater.org/" target="_blank">charity: water</a></p>
  </footer>
  <script src="script.js"></script>
  <script type="module">
    // Loading the sound effects themselves (AI-generated)
    await loadSound('start', 'sounds/start.mp3'); // Sound for starting the game
    await loadSound('score', 'sounds/water-can.mp3'); // Sound for collecting a water can
    await loadSound('rock', 'sounds/rock.mp3'); // Sound for collecting a rock
    await loadSound('win', 'sounds/win.mp3'); // Sound for winning the game
    await loadSound('lose', 'sounds/lose.mp3'); // Sound for losing the game
  </script>
</body>
</html>
