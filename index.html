<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1>Water Quest</h1>
    <p class="game-instructions">Collect water cans to complete the game!</p>
    <p class="game-rock-hint"><i>Collecting rocks will reduce your score.</i></p>
    <div class="difficulty-selection">
      <p>Select Difficulty:</p>
      <button class="difficulty-btn" data-difficulty="easy">Easy</button>
      <button class="difficulty-btn" data-difficulty="medium">Medium</button>
      <button class="difficulty-btn" data-difficulty="hard">Hard</button>
    </div>
    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Goal: <span id="goal">25</span></p>
      <p>Time Left: <span id="timer">40</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>
  </div>
  <!-- TODO: Add footer with charity: water links -->
  <script src="script.js"></script>
</body>
</html>
